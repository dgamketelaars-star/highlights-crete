<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Crete Interactive Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="addTabFocus()">

  <a href="#main-content" class="skip-link">Skip to Main Content</a>

  <header class="hero">
    <nav class="nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="beaches.html">Beaches</a></li>
        <li><a href="culture.html">Culture & Nature</a></li>
      </ul>
    </nav>

    <h1>Crete Interactive Gallery</h1>
    <p class="intro">
      Hover over or focus on an image to display it in the preview area.
    </p>
  </header>

  <main id="main-content">
    <div id="image">
      Hover over an image below to display here.
    </div>

    <section class="grid gallery">
      <img class="preview"
           src="images/crete-home-1.jpg"
           alt="A beautiful beach view in Crete"
           onmouseover="upDate(this)"
           onmouseleave="unDo()"
           onfocus="upDate(this)"
           onblur="unDo()">

      <img class="preview"
           src="images/crete-home-2.jpg"
           alt="A mountain landscape in Crete"
           onmouseover="upDate(this)"
           onmouseleave="unDo()"
           onfocus="upDate(this)"
           onblur="unDo()">

      <img class="preview"
           src="images/crete-home-3.jpg"
           alt="Traditional architecture in Crete"
           onmouseover="upDate(this)"
           onmouseleave="unDo()"
           onfocus="upDate(this)"
           onblur="unDo()">

      <img class="preview"
           src="images/crete-home-4.jpg"
           alt="A scenic sea view on the island of Crete"
           onmouseover="upDate(this)"
           onmouseleave="unDo()"
           onfocus="upDate(this)"
           onblur="unDo()">

      <img class="preview"
           src="images/balos.jpg"
           alt="Balos lagoon with turquoise water in Crete"
           onmouseover="upDate(this)"
           onmouseleave="unDo()"
           onfocus="upDate(this)"
           onblur="unDo()">

      <img class="preview"
           src="images/knossos.jpg"
           alt="The historic ruins of Knossos in Crete"
           onmouseover="upDate(this)"
           onmouseleave="unDo()"
           onfocus="upDate(this)"
           onblur="unDo()">
    </section>
  </main>

  <footer>
    <p>Crete Highlights project</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
